<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="720" height="400" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="360" y="27" fill="#8b949e" text-anchor="middle" font-size="12">samey — how same are your generations?</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> samey score generations.jsonl --max-sameness 40</text>
    <text x="24" y="92"><tspan fill="#79c0ff">samey score</tspan> — generations.jsonl (12 records)</text>
    <text x="24" y="124">  sameness   <tspan fill="#f778ba">████████████████</tspan><tspan fill="#30363d">░░░░░░░░</tspan>  66.6 / 100  <tspan fill="#ffa657">(mode collapse likely)</tspan></text>
    <text x="24" y="156" fill="#d2a8ff">  distinct-n            unique / total    ratio</text>
    <text x="24" y="178">    distinct-1           28 / 147       <tspan fill="#f778ba">0.190</tspan></text>
    <text x="24" y="200">    distinct-2           33 / 135       <tspan fill="#f778ba">0.244</tspan></text>
    <text x="24" y="222">    distinct-3           34 / 123       <tspan fill="#f778ba">0.276</tspan></text>
    <text x="24" y="254">  self-similarity  mean <tspan fill="#f778ba">0.646</tspan>  max 1.000  (66 pairs, exact)</text>
    <text x="24" y="276">  duplicates       1 cluster, <tspan fill="#f778ba">7 redundant records</tspan> (58.3% of corpus)</text>
    <text x="24" y="298">  entropy          4.12 bits (normalized 0.857)</text>
    <text x="24" y="320">  compression      <tspan fill="#f778ba">81.7%</tspan> cross-record redundancy</text>
    <text x="24" y="342">  vocabulary       28 types / 147 tokens  (hapax 57.1%)</text>
    <text x="24" y="374"><tspan fill="#ff7b72">GATE FAIL:</tspan> sameness 66.6 exceeds --max-sameness 40.0  <tspan fill="#8b949e">(exit 1)</tspan></text>
  </g>
</svg>
